baseURL = "https://yusufarbc.dev/"
languageCode = "en"
title = "Yusuf Talha ARABACI"
theme = "hugo-coder"

defaultContentLanguage = "en"
paginate = 20
enableEmoji = true

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      author = "Yusuf Talha ARABACI"
      info = "Security Engineer"
    [[languages.en.menu.main]]
      name = "Posts"
      weight = 1
      url = "posts/"
    [[languages.en.menu.main]]
      name = "Series"
      weight = 2
      url = "series/"
    [[languages.en.menu.main]]
      name = "About"
      weight = 3
      url = "about/"

  [languages.tr]
    contentDir = "content/tr"
    languageName = "Türkçe"
    weight = 2
    [languages.tr.params]
      author = "Yusuf Talha ARABACI"
      info = "Güvenlik Mühendisi"
    [[languages.tr.menu.main]]
      name = "Yazılar"
      weight = 1
      url = "posts/"
    [[languages.tr.menu.main]]
      name = "Seriler"
      weight = 2
      url = "series/"
    [[languages.tr.menu.main]]
      name = "Hakkımda"
      weight = 3
      url = "about/"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  author = "Yusuf Talha ARABACI"
  description = "Security Engineer specializing in Cloud-Native Security, SOC Architecture, and Open Source Defense."
  keywords = "cybersecurity, infosec, cloud-native security, soc architecture, open source defense, yusuf talha arabaci, malware analysis, pentesting"
  info = "Security Engineer"
  avatarURL = "images/profile.jpeg"
  
  # Technical SEO
  images = ["images/profile.jpeg"]
  titleSeparator = "|"
  customCSS = ["css/custom.css"]
  
  # Favicons
  favicon = "favicon.ico"
  appleTouchIcon = "images/favicons/apple-touch-icon.png"
  manifest = "site.webmanifest"
  
  # Language toggle
  enableLanguageInTitle = true
  
  # Theme mode toggle
  colorScheme = "auto"
  showMenuItemIcon = true
  
  # Footer
  footerContent = "Yusuf Talha ARABACI"
  
  # Social links
  [[params.social]]
    name = "Github"
    icon = "fa-brands fa-github fa-2x"
    weight = 1
    url = "https://github.com/yusufarbc/"
  [[params.social]]
    name = "LinkedIn"
    icon = "fa-brands fa-linkedin fa-2x"
    weight = 2
    url = "https://www.linkedin.com/in/yusufarbc/"
  [[params.social]]
    name = "Mastodon"
    icon = "fa-brands fa-mastodon fa-2x"
    weight = 3
    url = "https://infosec.exchange/@yusufarbc"
  [[params.social]]
    name = "Email"
    icon = "fa-solid fa-envelope fa-2x"
    weight = 4
    url = "mailto:yusuf.talhaarabaci@owasp.org"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[permalinks]
  posts = "/posts/:year/:month/:title/"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true # Required for some Medium HTML embeds if any

[services]
  [services.googleAnalytics]
    ID = "" # User can add this later

[minify]
  disableXML = false
  minifyOutput = false
